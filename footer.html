<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style/footer.css">
    <link rel="stylesheet" href="./style/style.css">
</head>
<body>
    <footer>
        <form action="/formulario-contato" method="post">
            <div class="form form-nome">
                <!-- <label for="nome">Nome</label> -->
                <input type="text" id="nome" name="nome" placeholder="Nome">
            </div>
            <div class="form form-email">
                <!-- <label for="email">Email</label> -->
                <input type="text" id="email" name="email" placeholder="Email">
            </div>
            <div class="form form-assunto">
                <!-- <label for="assunto">Assunto</label> -->
                <input type="text" id="assunto" name="assunto" placeholder="Assunto">
            </div>
            <div class="form form-mensagem">
                <!-- <label for="mensagem">Mensagem</label> -->
                <textarea name="mensagem" id="mensagem" cols="50" rows="5" placeholder="Mensagem"></textarea>
            </div>
            <div class="botao-enviar">
                <button type="submit">Enviar mensagem</button>
            </div>
        </form>
    </footer>
</body>
</html>
